root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/rbac-server ./cmd/server"
  bin = "./tmp/rbac-server"
  full_bin = "./tmp/rbac-server"
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "vendor", ".git", "bin", "dist"]
  include_dir = []
  exclude_file = []
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = tru